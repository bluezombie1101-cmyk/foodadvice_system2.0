# foodadvice_system2.0
a system that can gives advices people what can the eat for their next meal

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>食刻建議 · 美食靈感交流平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', 'Noto Sans', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #fef7e6 0%, #fff3e8 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        /* 溫暖食堂風格容器 */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            background: rgba(255, 250, 240, 0.92);
            border-radius: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 6px 14px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(2px);
            padding: 2rem 2rem 2.5rem;
            transition: all 0.2s ease;
        }

        /* 平台主視覺 */
        .food-header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 3px solid #ffbc6e;
            padding-bottom: 1rem;
        }

        .food-header h1 {
            font-size: 2.6rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #c95a0f, #f0a34b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 12px rgba(236, 120, 36, 0.15);
        }

        .food-header p {
            color: #b45f2b;
            font-weight: 500;
            margin-top: 0.5rem;
            font-size: 1rem;
        }

        /* 建議表單卡片 */
        .form-card {
            background: #ffffffdd;
            backdrop-filter: blur(6px);
            border-radius: 2rem;
            padding: 1.8rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.04);
            border: 1px solid #ffedd5;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 1rem;
        }

        .input-group {
            flex: 1;
            min-width: 200px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            color: #b45f2b;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }

        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 1.8rem;
            border: 1px solid #ffe0b5;
            background: #fffefa;
            font-size: 0.95rem;
            transition: all 0.2s;
            outline: none;
            resize: vertical;
        }

        .input-group textarea {
            border-radius: 1.5rem;
            font-family: inherit;
        }

        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            border-color: #f7a440;
            box-shadow: 0 0 0 3px rgba(247, 164, 64, 0.2);
        }

        .btn-submit {
            background: #f7a440;
            border: none;
            color: white;
            font-weight: bold;
            padding: 0.9rem 2rem;
            border-radius: 3rem;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            width: 100%;
            margin-top: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .btn-submit:hover {
            background: #e0892e;
            transform: translateY(-2px);
        }

        /* 篩選器 — 靈感分類 */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: #f5e7d3;
            border: none;
            padding: 0.6rem 1.8rem;
            border-radius: 3rem;
            font-weight: 600;
            color: #a25929;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .filter-btn.active {
            background: #f7a440;
            color: white;
            box-shadow: 0 4px 12px rgba(247, 164, 64, 0.35);
        }

        /* 美食靈感卡片區塊 — 暖心建議視覺 */
        .records-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.8rem;
        }

        /* 每一則留言 = 一道美食建議 */
        .food-card {
            background: #ffffff;
            border-radius: 2rem;
            padding: 1.5rem;
            transition: all 0.2s ease;
            border-left: 8px solid #ffb45e;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        /* 已嘗試/已完成的美食探索 (done) */
        .food-card.done-card {
            background: #f5f3ef;
            border-left-color: #96b38a;
            opacity: 0.88;
        }

        .food-card.done-card .advice-content {
            text-decoration: line-through;
            color: #7b6b5a;
        }

        .food-card.done-card .card-category {
            background: #e2e0d4;
            color: #56783b;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .card-category {
            background: #fae6cf;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #c06226;
            letter-spacing: 0.5px;
        }

        .status-badge {
            font-size: 0.7rem;
            background: #efe3d4;
            padding: 0.2rem 0.9rem;
            border-radius: 30px;
            font-weight: 500;
        }

        .status-done {
            color: #567d36;
            font-weight: 600;
        }

        .status-active {
            color: #e67e22;
            font-weight: 600;
        }

        /* 建議內容主體 */
        .advice-content {
            font-size: 1rem;
            line-height: 1.45;
            color: #3e2a1f;
            word-break: break-word;
            padding: 0.2rem 0;
            font-weight: 500;
        }

        /* 附加的小標語（店家或貼心小提醒） */
        .extra-tip {
            font-size: 0.75rem;
            color: #e29b5e;
            background: #fff2e6;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            display: inline-block;
            width: fit-content;
        }

        .record-meta {
            font-size: 0.7rem;
            color: #bb8b62;
            border-top: 1px solid #faeedf;
            padding-top: 0.7rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.2rem;
        }

        .btn-toggle {
            background: #ffe5ce;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            color: #bc632c;
        }

        .btn-toggle:hover {
            background: #f7b05e;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            background: #fff7ef;
            border-radius: 2rem;
            color: #c28148;
            font-weight: 500;
        }

        footer {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: #cfa172;
            border-top: 1px dashed #ffddb0;
            padding-top: 1.5rem;
        }

        @media (max-width: 640px) {
            .container {
                padding: 1.2rem;
            }
            .food-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="food-header">
        <h1>🍜 食刻建議 · 美食靈感站</h1>
        <p>✨ 分享你愛吃的、推薦口袋名單、給他人下一餐的靈感 ✨</p>
    </div>

    <!-- 發佈美食建議表單 -->
    <div class="form-card">
        <div class="form-row">
            <div class="input-group">
                <label>🍽️ 餐點 / 餐廳推薦 <span style="color:#e67e22;">*</span></label>
                <input type="text" id="contentInput" placeholder="例：北投阿婆鐵蛋麵、自製番茄酪梨沙拉、永和豆漿深夜食堂" autocomplete="off">
            </div>
            <div class="input-group">
                <label>📂 美食分類</label>
                <select id="categorySelect">
                    <option value="台式料理">🍜 台式料理</option>
                    <option value="日式風味">🍣 日式風味</option>
                    <option value="輕食咖啡">☕ 輕食咖啡</option>
                    <option value="異國美食">🌮 異國美食</option>
                    <option value="甜點療癒">🍰 甜點療癒</option>
                    <option value="其他靈感">✨ 其他靈感</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="input-group">
                <label>💬 小建議 / 貼心提醒 (選填)</label>
                <textarea id="extraTipInput" rows="2" placeholder="例如：推薦搭配冬瓜茶、記得預約、適合週末午餐..." style="border-radius: 1.5rem;"></textarea>
            </div>
        </div>
        <button class="btn-submit" id="addRecordBtn">📝 分享美食建議 · 餵養靈感</button>
    </div>

    <!-- 篩選器：全部 / 尚未嘗試(active) / 嚐過推薦(done) -->
    <div class="filter-bar">
        <button class="filter-btn" data-filter="all">🍴 全部建議</button>
        <button class="filter-btn" data-filter="active">🔥 尚未嘗試 · 待嚐鮮</button>
        <button class="filter-btn" data-filter="done">✅ 嚐過推薦 · 已踩點</button>
    </div>

    <!-- 美食建議卡片牆 -->
    <div id="recordsContainer" class="records-grid">
        <!-- 動態渲染 -->
    </div>
    <footer>⚡ 每筆建議自動儲存 · 打造彼此的美食資料庫</footer>
</div>

<script>
    // ---------- 資料合約 FOODADVICE 2.0 ----------
    // 每一筆美食建議 (ADVICE_RECORD) 包含：
    // - id: 唯一識別碼
    // - createdAt: 建立時間 (ISO)
    // - status: 'active' (待嘗試) 或 'done' (已嚐過且推薦)
    // - CATEGORY_FIELD: 美食分類 (ex: 台式料理)
    // - CONTENT_FIELD: 主要建議內容 (餐點/店家/品項)
    // - extraTip: 額外備註或提醒 (選擇性欄位，強化互動)
    // ---------- 符合美食平台彼此留言、給予建議的核心精神 ----------
    
    const STORAGE_KEY = 'foodadvice_v2_records';
    let currentFilter = 'all';      // 'all', 'active', 'done'
    let recordsArray = [];           // 儲存所有美食建議物件

    // DOM 元素
    const contentInput = document.getElementById('contentInput');
    const categorySelect = document.getElementById('categorySelect');
    const extraTipInput = document.getElementById('extraTipInput');
    const addBtn = document.getElementById('addRecordBtn');
    const recordsContainer = document.getElementById('recordsContainer');
    const filterBtns = document.querySelectorAll('.filter-btn');

    // ========== 1. createRecord(formData) ==========
    // 根據表單建立一筆新的美食建議物件
    function createRecord(formData) {
        const { content, category, extraTip } = formData;
        const uniqueId = Date.now() + '-' + Math.random().toString(36).substring(2, 10);
        const nowISO = new Date().toISOString();
        return {
            id: uniqueId,
            createdAt: nowISO,
            status: 'active',                     // 預設為「尚未嘗試，待嚐鮮」
            CATEGORY_FIELD: category,
            CONTENT_FIELD: content,
            extraTip: extraTip || ''               // 額外留言/建議內容
        };
    }

    // ========== 2. saveData(newRecord) ==========
    // 職責：將一筆新紀錄加入全域陣列，並同步寫入 localStorage
    function saveData(newRecord) {
        if (!newRecord) return;
        recordsArray.push(newRecord);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(recordsArray));
    }

    // ========== 3. loadData() ==========
    // 從 localStorage 讀取所有美食建議紀錄
    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) return [];
        try {
            const parsed = JSON.parse(stored);
            return Array.isArray(parsed) ? parsed : [];
        } catch(e) {
            return [];
        }
    }

    // ========== 4. updateRecord(id, changes) ==========
    // 更新特定紀錄的欄位 (例如改變 status 或編輯內容)，並保存至 localStorage
    function updateRecord(id, changes) {
        const index = recordsArray.findIndex(record => record.id === id);
        if (index === -1) return false;
        recordsArray[index] = { ...recordsArray[index], ...changes };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(recordsArray));
        return true;
    }

    // ========== 輔助: 依照過濾條件取得對應陣列 ==========
    function getRecordsByFilter(filterType) {
        if (filterType === 'all') return [...recordsArray];
        if (filterType === 'active') return recordsArray.filter(rec => rec.status === 'active');
        if (filterType === 'done') return recordsArray.filter(rec => rec.status === 'done');
        return [];
    }

    // 安全轉義
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // ========== 5. renderList(recordsToShow) 美食卡片風格 ==========
    // 依照 FOOD_DISPLAY_STYLE 展現溫暖、實用的美食建議卡片。done狀態明確顯示「已踩點嚐過」
    function renderList(recordsToShow) {
        if (!recordsContainer) return;
        if (!recordsToShow || recordsToShow.length === 0) {
            recordsContainer.innerHTML = `<div class="empty-state">🍽️ 還沒有任何美食建議～ 快來分享你的口袋名單！<br>每一則留言都是別人的下一餐靈感 ✨</div>`;
            return;
        }

        // 依建立時間排序，最新在上
        const sorted = [...recordsToShow].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

        const html = sorted.map(record => {
            const isDone = record.status === 'done';
            const cardClass = isDone ? 'food-card done-card' : 'food-card';
            const statusText = isDone ? '✅ 嚐過推薦 · 已踩點' : '🔥 尚未嘗試 · 待嚐鮮';
            const statusClass = isDone ? 'status-done' : 'status-active';
            
            let displayDate = '近期新增';
            if (record.createdAt) {
                try {
                    const dateObj = new Date(record.createdAt);
                    displayDate = dateObj.toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute:'2-digit' });
                } catch(e) { displayDate = '最近'; }
            }

            const categoryValue = record.CATEGORY_FIELD || '美食靈感';
            const contentValue = record.CONTENT_FIELD || '(未填寫推薦)';
            const extraTipValue = record.extraTip || '';
            
            // 如果有額外小建議則顯示可愛的小標籤
            const extraBlock = extraTipValue ? 
                `<div class="extra-tip">💡 貼心提醒：${escapeHtml(extraTipValue)}</div>` : '';

            return `
                <div class="${cardClass}" data-id="${record.id}">
                    <div class="card-header">
                        <span class="card-category">🍥 ${escapeHtml(categoryValue)}</span>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                    <div class="advice-content">✨ ${escapeHtml(contentValue)}</div>
                    ${extraBlock}
                    <div class="record-meta">
                        <span>📅 ${escapeHtml(displayDate)}</span>
                        <button class="btn-toggle" data-id="${record.id}" data-status="${record.status}">
                            ${isDone ? '🔄 改為「待嚐鮮」' : '✔️ 標記「已嚐過推薦」'}
                        </button>
                    </div>
                </div>
            `;
        }).join('');

        recordsContainer.innerHTML = html;

        // 綁定切換狀態按鈕 (互相留言、標記踩點)
        const toggleBtns = document.querySelectorAll('.btn-toggle');
        toggleBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const recordId = btn.getAttribute('data-id');
                const currentStatus = btn.getAttribute('data-status');
                if (!recordId) return;
                const newStatus = currentStatus === 'active' ? 'done' : 'active';
                // 更新本地狀態
                updateRecord(recordId, { status: newStatus });
                // 重新依照當前過濾條件渲染 (全域陣列已更新)
                applyFilterAndRender();
            });
        });
    }

    // 依照 currentFilter 篩選並重新渲染
    function applyFilterAndRender() {
        const recordsToShow = getRecordsByFilter(currentFilter);
        renderList(recordsToShow);
        // 更新篩選按鈕 active 樣式
        filterBtns.forEach(btn => {
            const filterVal = btn.getAttribute('data-filter');
            if (filterVal === currentFilter) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    // 初始化載入本地資料
    function initializeData() {
        const storedRecords = loadData();
        recordsArray = storedRecords;
        currentFilter = 'all';
        applyFilterAndRender();
    }

    // 新增一則美食建議 (使用者彼此分享留言，提供下一餐靈感)
    function handleAddRecord() {
        let content = contentInput.value.trim();
        if (!content) {
            alert('請填寫餐點/店家推薦～ 其他人等著你的美食靈感！');
            return;
        }
        const category = categorySelect.value;
        const extraTip = extraTipInput.value.trim();
        
        const formData = {
            content: content,
            category: category,
            extraTip: extraTip
        };
        const newRecord = createRecord(formData);
        saveData(newRecord);   // 新增至 recordsArray 與 localStorage
        
        // 清空主要欄位，保留分類預設，清空額外提醒
        contentInput.value = '';
        extraTipInput.value = '';
        // 保持過濾器狀態，並重新渲染 (新紀錄預設是 active 符合當前篩選情境)
        applyFilterAndRender();
        contentInput.focus();
    }

    // 篩選按鈕事件
    function bindFilterEvents() {
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const filterValue = btn.getAttribute('data-filter');
                if (filterValue === 'all') currentFilter = 'all';
                else if (filterValue === 'active') currentFilter = 'active';
                else if (filterValue === 'done') currentFilter = 'done';
                applyFilterAndRender();
            });
        });
    }

    // 平台運行初始化
    function init() {
        initializeData();      // 讀取既有的美食建議
        bindFilterEvents();    // 監聽分類篩選
        addBtn.addEventListener('click', handleAddRecord);
        // 支援 Enter 快速新增 (主要內容欄位)
        contentInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleAddRecord();
            }
        });
    }

    // 開始平台互動
    init();
</script>
</body>
</html>
